name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting Zero-Downtime Deployment..."

            if [ ! -d "/home/ubuntu/app" ]; then
             git clone https://github.com/Arpit-Sharma-as/App.git /home/ubuntu/app
            fi

            cd /home/ubuntu/app
            git pull

            echo "🔨 Building new image..."
            docker build -t node-app:new .

            echo "🚀 Running NEW container on temp port..."
            docker run -d -p 3001:3000 --name node-app-new node-app:new

            echo "⏳ Waiting for new container..."
            sleep 5

            echo "🛑 Stopping old container..."
            docker stop node-app || true
            docker rm node-app || true

            echo "🔁 Switching traffic..."
            docker run -d -p 80:3000 --name node-app node-app:new

            echo "🧹 Cleaning temp container..."
            docker stop node-app-new || true
            docker rm node-app-new || true

            echo "✅ Zero-downtime deployment complete!"
